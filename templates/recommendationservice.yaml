apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendationservice
  namespace: {{ .Values.namespace | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: recommendationservice
  template:
    metadata:
      labels:
        app: recommendationservice
    spec:
      containers:
        - name: recommendationservice
          image: "{{ .Values.image.registry }}/recommendationservice:{{ .Values.imageTags.recommendationservice }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "{{ .Values.services.recommendationservice.port }}"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:{{ .Values.services.productcatalogservice.port }}"
            - name: DISABLE_PROFILER
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: recommendationservice
  namespace: {{ .Values.namespace | quote }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: recommendationservice
  ports:
    - port: {{ .Values.services.recommendationservice.port }}
