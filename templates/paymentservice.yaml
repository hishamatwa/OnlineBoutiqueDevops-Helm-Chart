apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  namespace: {{ .Values.namespace | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      containers:
        - name: paymentservice
          image: "{{ .Values.image.registry }}/paymentservice:{{ .Values.imageTags.paymentservice }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "{{ .Values.services.paymentservice.port }}"
            - name: DISABLE_PROFILER
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: paymentservice
  namespace: {{ .Values.namespace | quote }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: paymentservice
  ports:
    - port: {{ .Values.services.paymentservice.port }}

